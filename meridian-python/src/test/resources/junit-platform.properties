# JUnit 5 parallel test execution
# Each @Test method in ConverterE2ETest is annotated @Execution(CONCURRENT)
# so that all 8 E2E tests run concurrently, capping total wall time to
# approximately the longest single test (~85-120s) instead of the sum (~680s).
#
# Parallelism is set to 4 rather than the full test count because:
#   - Each test spawns 2 mypyc processes internally (already parallelized)
#   - Apple Silicon has 8 performance cores; 4 tests × 2 mypyc = 8 processes
#   - Going beyond 4 causes CPU contention on mypyc compilation
#
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=4
